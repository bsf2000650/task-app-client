server {
    listen 80;
    server_name task-app.serveblog.net;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name task-app.serveblog.net;

    ssl_certificate /etc/letsencrypt/live/task-app.serveblog.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/task-app.serveblog.net/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://51.20.215.44:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}